name: Update and deploy portfolio

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "*/1 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync GitHub project data
        env:
          PORTFOLIO_GITHUB_USERNAME: uhuabagoly
          PORTFOLIO_GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN || github.token }}
        run: node ./scripts/sync-github-projects.mjs

      - name: Render static pages from synced data
        run: node ./scripts/render-static.mjs

      - name: Prepare public Pages directory
        run: node ./scripts/prepare-public-dir.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
